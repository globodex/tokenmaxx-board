name: Deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "37 14 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run checks
        run: npm run check

      - name: Prepare static site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/data _site/scripts
          cp index.html app.js styles.css _site/
          cp data/*.json _site/data/
          cp scripts/profile-store.mjs _site/scripts/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed leaderboard data
        env:
          TOKENMAXX_PAGES_URL: ${{ steps.deployment.outputs.page_url }}
          TOKENMAXX_VERIFY_TIMEOUT_MS: 240000
        run: node scripts/verify-pages.mjs
